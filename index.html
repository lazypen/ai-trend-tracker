<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Trend Tracker</title>
  <script src="articles_data.js"></script>
  <style>
    /* ── Reset & Variables ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #0d0d14;
      --bg2:        #13131f;
      --bg3:        #1a1a2e;
      --border:     #252538;
      --text:       #e2e2f0;
      --text2:      #9090b0;
      --text3:      #5a5a7a;
      --accent:     #6c6af6;
      --accent-dim: #6c6af620;
      --card-bg:    #13131f;
      --card-hover: #1a1a2e;
      --star:       #f59e0b;
      --radius:     10px;
      --shadow:     0 2px 12px rgba(0,0,0,0.4);
    }
    [data-theme="light"] {
      --bg:         #f4f4fb;
      --bg2:        #ffffff;
      --bg3:        #eeeef8;
      --border:     #ddddf0;
      --text:       #111128;
      --text2:      #44446a;
      --text3:      #8888aa;
      --accent:     #5a58e6;
      --accent-dim: #5a58e615;
      --card-bg:    #ffffff;
      --card-hover: #f0f0fc;
      --shadow:     0 2px 12px rgba(0,0,0,0.08);
    }

    body, header, aside, .card, #search {
      transition: background-color 0.2s ease, border-color 0.2s ease, color 0.2s ease;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      font-size: 14px;
      line-height: 1.5;
    }

    /* ── Header ── */
    header {
      position: sticky; top: 0; z-index: 100;
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
    }
    .header-inner {
      max-width: 1400px; margin: 0 auto;
      display: flex; align-items: center; gap: 16px;
      height: 64px;
    }
    .brand { display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
    .brand-icon { font-size: 28px; line-height: 1; }
    .brand h1 { font-size: 18px; font-weight: 700; color: var(--text); letter-spacing: -0.3px; }
    .brand .subtitle {
      font-size: 11px; color: var(--text3);
      margin-top: 1px;
    }
    .header-center { flex: 1; display: flex; justify-content: center; }
    .search-wrap {
      position: relative; width: 100%; max-width: 420px;
    }
    .search-wrap svg {
      position: absolute; left: 11px; top: 50%; transform: translateY(-50%);
      color: var(--text3); pointer-events: none;
    }
    #search {
      width: 100%; padding: 8px 12px 8px 36px;
      background: var(--bg3); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text); font-size: 13px;
      outline: none; transition: border-color .15s;
    }
    #search:focus { border-color: var(--accent); }
    #search::placeholder { color: var(--text3); }
    .header-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
    .icon-btn {
      background: var(--bg3); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text2); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      width: 36px; height: 36px; font-size: 16px;
      transition: background .15s, color .15s;
    }
    .icon-btn:hover { background: var(--accent-dim); color: var(--accent); }
    #lastUpdated {
      font-size: 11px; color: var(--text3); white-space: nowrap;
    }

    /* ── Layout ── */
    .layout {
      max-width: 1400px; margin: 0 auto;
      display: grid; grid-template-columns: 220px 1fr;
      gap: 0; min-height: calc(100vh - 64px);
    }

    /* ── Sidebar ── */
    aside {
      border-right: 1px solid var(--border);
      padding: 20px 0;
      position: sticky; top: 64px;
      height: calc(100vh - 64px);
      overflow-y: auto;
    }
    .sidebar-section { padding: 0 12px 16px; }
    .sidebar-label {
      font-size: 10px; font-weight: 600; letter-spacing: .8px;
      color: var(--text3); text-transform: uppercase;
      padding: 0 8px; margin-bottom: 6px;
    }
    .filter-btn {
      display: flex; align-items: center; gap: 9px;
      width: 100%; padding: 8px 10px; border-radius: 8px;
      background: none; border: none; color: var(--text2);
      cursor: pointer; font-size: 13px; text-align: left;
      transition: background .12s, color .12s;
      position: relative;
    }
    .filter-btn:hover { background: var(--bg3); color: var(--text); }
    .filter-btn.active { background: var(--accent-dim); color: var(--accent); font-weight: 600; }
    .filter-btn .dot {
      width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
    }
    .filter-btn .count {
      margin-left: auto; font-size: 11px; color: var(--text3);
      background: var(--bg3); padding: 1px 7px; border-radius: 10px;
    }
    .filter-btn.active .count { background: var(--accent-dim); color: var(--accent); }
    .sidebar-divider {
      height: 1px; background: var(--border); margin: 8px 12px 16px;
    }
    /* Sources list */
    .source-item {
      display: flex; align-items: center; gap: 8px;
      padding: 5px 10px; font-size: 12px; color: var(--text2);
      cursor: pointer; border-radius: 6px;
      transition: background .12s, color .12s;
    }
    .source-item:hover { background: var(--bg3); color: var(--text); }
    .source-item.active { color: var(--text); font-weight: 600; background: var(--bg3); }
    .source-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .source-count { margin-left: auto; font-size: 11px; color: var(--text3); }

    /* ── Main feed ── */
    main { padding: 24px; }
    .feed-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 20px;
    }
    .feed-title { font-size: 13px; color: var(--text2); }
    .feed-title strong { color: var(--text); }
    .sort-select {
      background: var(--bg3); border: 1px solid var(--border);
      color: var(--text2); font-size: 12px; padding: 5px 10px;
      border-radius: 7px; cursor: pointer; outline: none;
    }

    /* Date group header */
    .date-group { margin-bottom: 28px; }
    .date-label {
      font-size: 11px; font-weight: 700; letter-spacing: .6px;
      text-transform: uppercase; color: var(--text3);
      margin-bottom: 12px;
      display: flex; align-items: center; gap: 8px;
    }
    .date-label::after {
      content: ""; flex: 1; height: 1px; background: var(--border);
    }

    /* Cards grid */
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 14px;
    }

    /* Card */
    .card {
      background: var(--card-bg); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 16px;
      display: flex; flex-direction: column; gap: 10px;
      transition: background .15s, border-color .15s, transform .12s;
      cursor: pointer; position: relative;
    }
    .card:hover { background: var(--card-hover); border-color: var(--accent); transform: translateY(-1px); }
    .card.read { opacity: .65; }
    .card-meta {
      display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
    }
    .source-badge {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 11px; font-weight: 600; color: var(--text2);
    }
    .source-badge .dot { width: 7px; height: 7px; border-radius: 50%; }
    .card-date { font-size: 11px; color: var(--text3); margin-left: auto; }
    .card-title {
      font-size: 14px; font-weight: 600; color: var(--text);
      line-height: 1.4; text-decoration: none;
    }
    .card-title:hover { color: var(--accent); }
    .card-summary { font-size: 12px; color: var(--text2); line-height: 1.55; }
    .card-footer {
      display: flex; align-items: center; gap: 8px; margin-top: 2px;
    }
    .cat-badge {
      font-size: 10px; font-weight: 600; padding: 3px 8px;
      border-radius: 20px; letter-spacing: .2px;
    }
    .card-actions { margin-left: auto; display: flex; gap: 6px; }
    .action-btn {
      background: none; border: none; cursor: pointer;
      font-size: 15px; opacity: .45; transition: opacity .15s, transform .1s;
      padding: 2px; line-height: 1;
    }
    .action-btn:hover { opacity: 1; transform: scale(1.15); }
    .action-btn.starred { opacity: 1; }
    .unread-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--accent); flex-shrink: 0;
    }

    /* Empty state */
    .empty-state {
      text-align: center; padding: 80px 20px; color: var(--text3);
    }
    .empty-state .emoji { font-size: 48px; margin-bottom: 12px; }
    .empty-state p { font-size: 15px; }
    .empty-state small { font-size: 12px; margin-top: 6px; display: block; }

    /* Loading */
    .loading {
      text-align: center; padding: 80px 20px; color: var(--text3);
      font-size: 14px;
    }

    /* Spinning animation */
    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    .spinning {
      animation: spin 1s linear infinite;
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* Mobile */
    @media (max-width: 768px) {
      .layout { grid-template-columns: 1fr; }
      aside {
        position: static; height: auto; border-right: none;
        border-bottom: 1px solid var(--border);
        display: flex; flex-wrap: wrap; gap: 4px;
        padding: 12px; overflow: visible;
      }
      .sidebar-section { padding: 0; }
      .sidebar-label { display: none; }
      .filter-btn { width: auto; padding: 6px 10px; font-size: 12px; }
      .filter-btn .count { display: none; }
      .sidebar-divider { display: none; }
      main { padding: 16px; }
      .header-inner { gap: 10px; }
      #lastUpdated { display: none; }
    }
  </style>
</head>
<body>

<!-- ── Header ── -->
<header>
  <div class="header-inner">
    <div class="brand">
      <span class="brand-icon">🤖</span>
      <div>
        <h1>AI Trend Tracker</h1>
        <div id="lastUpdated" class="subtitle">Loading...</div>
      </div>
    </div>
    <div class="header-center">
      <div class="search-wrap">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
        <input type="search" id="search" placeholder="Search articles, sources…" autocomplete="off" />
      </div>
    </div>
    <div class="header-right">
      <span id="lastUpdated2" style="font-size:11px;color:var(--text3)"></span>
      <button class="icon-btn" id="themeBtn" title="Toggle theme" aria-label="Toggle dark mode">🌙</button>
      <button class="icon-btn" id="refreshBtn" onclick="handleRefresh()" title="Fetch latest articles & reload">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
          <path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/>
          <path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/>
          <path d="M8 16H3v5"/>
        </svg>
      </button>
    </div>
  </div>
</header>

<!-- ── Layout ── -->
<div class="layout">

  <!-- Sidebar -->
  <aside id="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-label">Categories</div>
      <div id="categoryFilters"></div>
    </div>
    <div class="sidebar-divider"></div>
    <div class="sidebar-section">
      <div class="sidebar-label">Sources</div>
      <div id="sourceFilters"></div>
    </div>
  </aside>

  <!-- Feed -->
  <main>
    <div class="feed-header">
      <div class="feed-title"><strong id="articleCount">0</strong> articles</div>
      <select class="sort-select" id="sortSelect">
        <option value="newest">Newest first</option>
        <option value="oldest">Oldest first</option>
        <option value="unread">Unread first</option>
      </select>
    </div>
    <div id="feed">
      <div class="loading">Loading articles…</div>
    </div>
  </main>

</div>

<script>
// ── State ────────────────────────────────────────────────────────────────────

const LS_FAVS   = 'aitracker_favs';
const LS_READ   = 'aitracker_read';
const LS_THEME  = 'aitracker_theme';
const LS_SOURCE = 'aitracker_source';

let favorites  = new Set(JSON.parse(localStorage.getItem(LS_FAVS)  || '[]'));
let readItems  = new Set(JSON.parse(localStorage.getItem(LS_READ)   || '[]'));
let activeCategory = 'All';
let activeSource   = 'All';
let searchQuery    = '';
let sortMode       = 'newest';

// ── Category config ───────────────────────────────────────────────────────

const CAT_CONFIG = {
  'All':               { icon: '🌐', color: '#6c6af6' },
  '⭐ Favorites':      { icon: '⭐', color: '#f59e0b' },
  'Models & Research': { icon: '🔬', color: '#6c6af6' },
  'Big Tech News':     { icon: '🏢', color: '#22c55e' },
  'Real-world AI Use': { icon: '🌍', color: '#f59e0b' },
  'Tools & Stack':     { icon: '🛠️', color: '#8b5cf6' },
  'Funding & Business':{ icon: '💰', color: '#ec4899' },
  'Policy & Safety':   { icon: '📜', color: '#14b8a6' },
};

// ── Init ─────────────────────────────────────────────────────────────────────

function init() {
  // Theme
  const savedTheme = localStorage.getItem(LS_THEME) || 'dark';
  document.documentElement.setAttribute('data-theme', savedTheme);
  document.getElementById('themeBtn').textContent = savedTheme === 'dark' ? '☀️' : '🌙';

  if (typeof ARTICLES_DATA === 'undefined') {
    document.getElementById('feed').innerHTML = `
      <div class="empty-state">
        <div class="emoji">📭</div>
        <p>No articles loaded yet.</p>
        <small>Run <code>python3 fetch_ai_news.py</code> to fetch the latest news.</small>
      </div>`;
    return;
  }

  // Last updated
  const lu = new Date(ARTICLES_DATA.last_updated);
  const luStr = lu.toLocaleDateString('en-US', { weekday:'short', month:'short', day:'numeric' })
              + ' · ' + lu.toLocaleTimeString('en-US', { hour:'2-digit', minute:'2-digit' });
  document.getElementById('lastUpdated').textContent = `Updated ${luStr}`;
  document.getElementById('lastUpdated2').textContent = `Updated ${luStr}`;

  buildSidebar();
  render();
  bindEvents();
}

// ── Sidebar ───────────────────────────────────────────────────────────────────

function buildSidebar() {
  const arts = ARTICLES_DATA.articles;
  const catCounts = {};
  const srcCounts = {};

  arts.forEach(a => {
    catCounts[a.category] = (catCounts[a.category] || 0) + 1;
    srcCounts[a.source]   = (srcCounts[a.source]   || 0) + 1;
  });
  const favCount = arts.filter(a => favorites.has(a.id)).length;

  // Category filters
  const catEl = document.getElementById('categoryFilters');
  const cats  = ['All', '⭐ Favorites', ...Object.keys(CAT_CONFIG).filter(k => k !== 'All' && k !== '⭐ Favorites')];

  cats.forEach(cat => {
    const cfg   = CAT_CONFIG[cat] || { icon: '●', color: '#6b7280' };
    const count = cat === 'All' ? arts.length : cat === '⭐ Favorites' ? favCount : (catCounts[cat] || 0);
    const btn   = document.createElement('button');
    btn.className = 'filter-btn' + (cat === activeCategory ? ' active' : '');
    btn.dataset.cat = cat;
    btn.innerHTML = `
      <span class="dot" style="background:${cfg.color}"></span>
      ${cat}
      <span class="count">${count}</span>`;
    btn.onclick = () => { activeCategory = cat; activeSource = 'All'; buildSidebar(); render(); };
    catEl.appendChild(btn);
  });

  // Source filters
  const srcEl = document.getElementById('sourceFilters');
  srcEl.innerHTML = '';
  const allSrcBtn = document.createElement('div');
  allSrcBtn.className = 'source-item' + (activeSource === 'All' ? ' active' : '');
  allSrcBtn.innerHTML = `<span class="source-dot" style="background:#6c6af6"></span> All sources <span class="source-count">${arts.length}</span>`;
  allSrcBtn.onclick = () => { activeSource = 'All'; buildSidebar(); render(); };
  srcEl.appendChild(allSrcBtn);

  const sourceColors = {};
  arts.forEach(a => { sourceColors[a.source] = a.color; });

  Object.entries(srcCounts)
    .sort((a, b) => b[1] - a[1])
    .forEach(([src, count]) => {
      const el = document.createElement('div');
      el.className = 'source-item' + (activeSource === src ? ' active' : '');
      el.innerHTML = `<span class="source-dot" style="background:${sourceColors[src] || '#6b7280'}"></span> ${src} <span class="source-count">${count}</span>`;
      el.onclick = () => { activeSource = src; buildSidebar(); render(); };
      srcEl.appendChild(el);
    });
}

// ── Render ────────────────────────────────────────────────────────────────────

function getFiltered() {
  let arts = ARTICLES_DATA.articles;

  // Category filter
  if (activeCategory === '⭐ Favorites') {
    arts = arts.filter(a => favorites.has(a.id));
  } else if (activeCategory !== 'All') {
    arts = arts.filter(a => a.category === activeCategory);
  }

  // Source filter
  if (activeSource !== 'All') {
    arts = arts.filter(a => a.source === activeSource);
  }

  // Search
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    arts = arts.filter(a =>
      a.title.toLowerCase().includes(q) ||
      (a.summary || '').toLowerCase().includes(q) ||
      a.source.toLowerCase().includes(q)
    );
  }

  // Sort
  if (sortMode === 'oldest') {
    arts = [...arts].sort((a, b) => a.published < b.published ? -1 : 1);
  } else if (sortMode === 'unread') {
    arts = [...arts].sort((a, b) => {
      const aR = readItems.has(a.id) ? 1 : 0;
      const bR = readItems.has(b.id) ? 1 : 0;
      return aR - bR || (a.published < b.published ? 1 : -1);
    });
  }

  return arts;
}

function groupByDate(arts) {
  const groups = {};
  const now = new Date();
  arts.forEach(a => {
    const d   = new Date(a.published);
    const diff = Math.floor((now - d) / 86400000);
    let label;
    if (diff === 0)      label = 'Today';
    else if (diff === 1) label = 'Yesterday';
    else if (diff < 7)   label = d.toLocaleDateString('en-US', { weekday:'long' });
    else                 label = d.toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' });
    (groups[label] = groups[label] || []).push(a);
  });
  return groups;
}

function relativeTime(iso) {
  const d = new Date(iso);
  const diff = Math.floor((Date.now() - d) / 1000);
  if (diff < 60)   return 'just now';
  if (diff < 3600) return `${Math.floor(diff/60)}m ago`;
  if (diff < 86400)return `${Math.floor(diff/3600)}h ago`;
  return d.toLocaleDateString('en-US', { month:'short', day:'numeric' });
}

function render() {
  const arts = getFiltered();
  document.getElementById('articleCount').textContent = arts.length;

  const feed = document.getElementById('feed');
  if (!arts.length) {
    feed.innerHTML = `
      <div class="empty-state">
        <div class="emoji">${searchQuery ? '🔍' : '📭'}</div>
        <p>${searchQuery ? `No results for "${searchQuery}"` : 'No articles found.'}</p>
        <small>${searchQuery ? 'Try a different search term.' : 'Run fetch_ai_news.py to load news.'}</small>
      </div>`;
    return;
  }

  const groups = groupByDate(arts);
  let html = '';

  Object.entries(groups).forEach(([label, items]) => {
    html += `<div class="date-group"><div class="date-label">${label} <span style="font-weight:400;color:var(--text3)">(${items.length})</span></div><div class="cards">`;
    items.forEach(a => {
      const isFav  = favorites.has(a.id);
      const isRead = readItems.has(a.id);
      const cfg    = CAT_CONFIG[a.category] || { color: '#6b7280' };

      html += `
        <div class="card${isRead ? ' read' : ''}" data-id="${a.id}" role="article" tabindex="0" onclick="openArticle('${a.id}','${escAttr(a.url)}')" onkeydown="if(event.key==='Enter'||event.key===' ')openArticle('${a.id}','${escAttr(a.url)}')" aria-label="${esc(a.title)}">
          <div class="card-meta">
            <span class="source-badge">
              <span class="dot" style="background:${a.color}"></span>
              ${esc(a.source)}
            </span>
            ${!isRead ? '<span class="unread-dot"></span>' : ''}
            <span class="card-date">${relativeTime(a.published)}</span>
          </div>
          <a class="card-title" href="${escAttr(a.url)}" target="_blank" rel="noopener"
             onclick="event.stopPropagation(); markRead('${a.id}')">${esc(a.title)}</a>
          ${a.summary ? `<div class="card-summary">${esc(a.summary)}</div>` : ''}
          <div class="card-footer">
            <span class="cat-badge" style="background:${cfg.color}22;color:${cfg.color}">${a.category}</span>
            <div class="card-actions">
              <button class="action-btn${isFav ? ' starred' : ''}" onclick="event.stopPropagation();toggleFav('${a.id}')"
                title="${isFav ? 'Remove from favorites' : 'Add to favorites'}">⭐</button>
              <button class="action-btn" onclick="event.stopPropagation();toggleRead('${a.id}')"
                title="${isRead ? 'Mark unread' : 'Mark read'}">${isRead ? '○' : '✓'}</button>
            </div>
          </div>
        </div>`;
    });
    html += '</div></div>';
  });

  feed.innerHTML = html;
}

// ── Actions ───────────────────────────────────────────────────────────────────

async function handleRefresh() {
  const btn = document.getElementById('refreshBtn');
  const icon = btn ? btn.querySelector('svg') : null;

  if (icon) icon.classList.add('spinning');
  if (btn) btn.disabled = true;

  try {
    const response = await fetch('/api/refresh', { method: 'POST' });
    if (response.ok) {
      console.log('Refresh successful, reloading page...');
      location.reload();
      return;
    } else {
      console.error('Server error on refresh:', response.statusText);
    }
  } catch (err) {
    console.warn('API refresh failed, falling back to page reload:', err);
  }

  // Fallback
  location.reload();
}

function openArticle(id, url) {
  if (!isSafeUrl(url)) return;
  markRead(id);
  window.open(url, '_blank', 'noopener');
}

function markRead(id) {
  readItems.add(id);
  saveRead();
  // Update card without full re-render
  const card = document.querySelector(`.card[data-id="${id}"]`);
  if (card) { card.classList.add('read'); const dot = card.querySelector('.unread-dot'); if (dot) dot.remove(); }
}

function toggleRead(id) {
  if (readItems.has(id)) readItems.delete(id); else readItems.add(id);
  saveRead(); render();
}

function toggleFav(id) {
  if (favorites.has(id)) favorites.delete(id); else favorites.add(id);
  saveFavs(); buildSidebar(); render();
}

function saveFavs() { localStorage.setItem(LS_FAVS, JSON.stringify([...favorites])); }
function saveRead()  { localStorage.setItem(LS_READ, JSON.stringify([...readItems])); }

// ── Events ────────────────────────────────────────────────────────────────────

function bindEvents() {
  let searchTimer;
  document.getElementById('search').addEventListener('input', e => {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => { searchQuery = e.target.value.trim(); render(); }, 250);
  });

  document.getElementById('sortSelect').addEventListener('change', e => {
    sortMode = e.target.value; render();
  });

  document.getElementById('themeBtn').addEventListener('click', () => {
    const cur = document.documentElement.getAttribute('data-theme');
    const next = cur === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    document.getElementById('themeBtn').textContent = next === 'dark' ? '☀️' : '🌙';
    localStorage.setItem(LS_THEME, next);
  });
}

// ── Utils ─────────────────────────────────────────────────────────────────────

function esc(s) {
  return String(s || '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}
function escAttr(s) { return esc(s); }

function isSafeUrl(url) {
  try {
    const u = new URL(url);
    return u.protocol === 'http:' || u.protocol === 'https:';
  } catch { return false; }
}

// ── Boot ──────────────────────────────────────────────────────────────────────

init();
</script>
