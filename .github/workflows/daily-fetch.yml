name: Daily AI News Fetch

on:
  schedule:
    - cron: '0 6 * * *'   # 6:00 AM UTC every day
  workflow_dispatch:        # Also allows manual "Run workflow" button on GitHub

permissions:
  contents: write           # Needed to commit articles_data.js back to the repo

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch AI news
        run: python fetch_ai_news.py

      - name: Commit updated articles_data.js
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add articles_data.js
          git diff --cached --quiet || git commit -m "chore: update AI news $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
